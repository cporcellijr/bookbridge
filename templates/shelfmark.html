{% extends "base.html" %}
{% block title %}Shelfmark · BookBridge{% endblock %}

{% block head %}
<style>
    body {
        overflow: hidden;
    }

    .iframe-container {
        width: 100%;
        height: calc(100vh - var(--nav-height));
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="iframe-container">
    <iframe src="{{ shelfmark_url }}" title="Shelfmark Tool" allowfullscreen></iframe>
</div>
{% endblock %}
