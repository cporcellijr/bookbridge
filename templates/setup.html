{% extends "base.html" %}
{% set hide_chrome = true %}

{% block title %}Set up BookBridge{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div class="auth-brand">
            <img src="/static/icon.png" alt="BookBridge" class="app-icon">
            <h1 class="brand-wordmark">BookBridge</h1>
            <p>Create the first administrator account.</p>
        </div>
        {% if error %}<div class="flash-message error">{{ error }}</div>{% endif %}
        <form method="POST" action="{{ url_for('setup') }}{% if request.args.get('next') %}?next={{ request.args.get('next')|urlencode }}{% endif %}">
            <div class="form-group">
                <label for="username" class="form-label">Admin username</label>
                <input type="text" id="username" name="username" class="form-input" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create admin</button>
        </form>
    </div>
</div>
{% endblock %}
