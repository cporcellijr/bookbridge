services:
  bookbridge-diagnostics:
    build: .
    container_name: bookbridge_diagnostics
    restart: unless-stopped
    ports:
      - "20129:20129"
    volumes:
      - ./data:/data
    networks:
      - blackcat-net
    environment:
      - TZ=America/New_York
      - DIAG_READ_TOKEN=${DIAG_READ_TOKEN:-}
      - DIAG_MAX_COMMENTS_PER_DAY=${DIAG_MAX_COMMENTS_PER_DAY:-20}

networks:
  blackcat-net:
    external: true
