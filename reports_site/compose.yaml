services:
  bookbridge_reports:
    build: .
    container_name: bookbridge_reports
    restart: unless-stopped
    ports:
      - "127.0.0.1:5761:8000"
    environment:
      DIAGNOSTICS_REVIEW_STATE: /run/config/review-state.json
      DIAGNOSTICS_READ_TOKEN_FILE: /run/secrets/diagnostics_read_token
    volumes:
      - type: bind
        source: ../docs/automated-review/review-state.json
        target: /run/config/review-state.json
        read_only: true
    secrets:
      - diagnostics_read_token

secrets:
  diagnostics_read_token:
    file: ${USERPROFILE}/.bookbridge/diagnostics-read.key
