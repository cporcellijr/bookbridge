name: Package KOReader Plugins

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build plugin zips
        run: python scripts/package_koreader_plugins.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: koreader-plugins
          path: dist/plugins/*.zip

      - name: Attach zips to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/plugins/*.zip
